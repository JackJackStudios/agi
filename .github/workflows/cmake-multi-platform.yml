name: CMake build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y xorg-dev libvulkan-dev vulkan-tools libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install Vulkan SDK on Windows
      if: runner.os == 'Windows'
      run: |
        $VulkanVersion = "1.3.296.0"
        $VulkanZipUrl = "https://sdk.lunarg.com/sdk/download/$VulkanVersion/windows/VulkanSDK-$VulkanVersion-Installer.zip"
        $TempPath = Join-Path $env:TEMP "VulkanSDK.zip"
        $InstallPath = "C:\VulkanSDK\$VulkanVersion"
    
        try {
            Write-Host "Downloading Vulkan SDK ZIP..."
            Invoke-WebRequest -Uri $VulkanZipUrl -OutFile $TempPath
    
            Write-Host "Extracting Vulkan SDK..."
            Expand-Archive -Path $TempPath -DestinationPath "C:\VulkanSDK" -Force
    
            Write-Host "Setting environment variables..."
            [Environment]::SetEnvironmentVariable("VULKAN_SDK", $InstallPath, "User")
            $env:PATH += ";$InstallPath\Bin"
    
            Write-Host "Vulkan SDK $VulkanVersion installed successfully!"
        }
        catch {
            Write-Error "Vulkan SDK installation failed: $_"
            exit 1
        }
        finally {
            if (Test-Path $TempPath) {
                Remove-Item $TempPath -Force -ErrorAction SilentlyContinue
            }
        }
      shell: powershell

    - name: Configure CMake
      run: |
        if [[ "${{ matrix.c_compiler }}" == "gcc" ]]; then
          CXX=g++
        elif [[ "${{ matrix.c_compiler }}" == "clang" ]]; then
          CXX=clang++
        else
          CXX=cl
        fi
        
        cmake -B build \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -S ${{ github.workspace }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
