name: CMake build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y xorg-dev libvulkan-dev vulkan-tools libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install Vulkan SDK on Windows
      if: runner.os == 'Windows'
      run: |
        # Set the Vulkan SDK version and URL
        $VulkanVersion = "1.3.296.0"
        $VulkanUrl = "https://sdk.lunarg.com/sdk/download/$VulkanVersion/windows/VulkanSDK-$VulkanVersion-Installer.exe"
        
        # Set the installer path in TEMP
        $InstallerPath = Join-Path $env:TEMP "VulkanSDK-Installer.exe"
    
        try {
            Write-Host "Downloading Vulkan SDK $VulkanVersion..."
            Invoke-WebRequest -Uri $VulkanUrl -OutFile $InstallerPath
    
            Write-Host "Installing Vulkan SDK silently..."
            Start-Process -FilePath $InstallerPath -ArgumentList "/S" -Wait
    
            # Detect installation folder (default is C:\VulkanSDK\<version>)
            $VulkanSdkPath = "C:\VulkanSDK\$VulkanVersion"
            if (-Not (Test-Path $VulkanSdkPath)) {
                throw "Vulkan SDK installation folder not found at $VulkanSdkPath"
            }
    
            Write-Host "Adding Vulkan SDK to environment variables..."
            # Set VULKAN_SDK environment variable for the user
            [Environment]::SetEnvironmentVariable("VULKAN_SDK", $VulkanSdkPath, "User")
            # Update PATH for this session
            $env:PATH += ";$VulkanSdkPath\Bin"
    
            Write-Host "Vulkan SDK $VulkanVersion installation complete!"
        }
        catch {
            Write-Error "Vulkan SDK installation failed: $_"
            exit 1
        }
        finally {
            # Clean up installer
            if (Test-Path $InstallerPath) {
                Remove-Item -Path $InstallerPath -Force -ErrorAction SilentlyContinue
            }
        }
      shell: powershell

    - name: Configure CMake
      run: |
        if [[ "${{ matrix.c_compiler }}" == "gcc" ]]; then
          CXX=g++
        elif [[ "${{ matrix.c_compiler }}" == "clang" ]]; then
          CXX=clang++
        else
          CXX=cl
        fi
        
        cmake -B build \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -S ${{ github.workspace }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
